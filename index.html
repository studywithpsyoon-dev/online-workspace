<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24hr online workplace</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FFF8F0;
      --beige: #F5F0E8;
      --warm-bg: #FAF6F1;
      --brown: #8B7355;
      --brown-dark: #6B5740;
      --brown-light: #A89279;
      --orange: #E8A87C;
      --orange-soft: #F0C4A0;
      --green-soft: #A8C5A0;
      --green-dark: #6B9B62;
      --red-soft: #D4836B;
      --text-primary: #3D3225;
      --text-secondary: #7A6B5D;
      --text-light: #A09080;
      --shadow-sm: 0 2px 8px rgba(139, 115, 85, 0.08);
      --shadow-md: 0 4px 16px rgba(139, 115, 85, 0.12);
      --shadow-lg: 0 8px 32px rgba(139, 115, 85, 0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background-color: var(--warm-bg);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ========== LAYOUT ========== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ========== HEADER ========== */
    .header {
      text-align: center;
      padding: 48px 0 32px;
    }

    .header-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--brown-dark);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .header .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 14px;
      background: var(--orange-soft);
      color: var(--brown-dark);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ========== CARD ========== */
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(139, 115, 85, 0.06);
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--brown-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      font-size: 20px;
    }

    /* ========== STATUS PANEL ========== */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--beige);
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green-soft);
      flex-shrink: 0;
    }

    .status-dot.active {
      background: var(--green-dark);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .member-count {
      font-weight: 600;
      color: var(--brown-dark);
    }

    /* ========== CHECK-IN FORM ========== */
    .checkin-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkin-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--beige);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      background: var(--cream);
      color: var(--text-primary);
      transition: border-color 0.2s;
      outline: none;
    }

    .checkin-form input:focus {
      border-color: var(--orange);
    }

    .checkin-form input::placeholder {
      color: var(--text-light);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-enter {
      background: var(--brown);
      color: #fff;
    }
    .btn-enter:hover { background: var(--brown-dark); }
    .btn-enter:disabled {
      background: var(--brown-light);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-exit {
      background: var(--red-soft);
      color: #fff;
    }
    .btn-exit:hover { background: #c0725a; }

    .btn-meet {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--green-dark), #5a8a52);
      color: #fff;
      font-size: 16px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      margin-top: 16px;
    }

    .btn-meet:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

    /* ========== MEMBER LIST ========== */
    .member-list {
      list-style: none;
    }

    .member-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: var(--cream);
      margin-bottom: 8px;
      font-size: 14px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--orange-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--brown-dark);
    }

    .member-nickname {
      font-weight: 500;
      color: var(--text-primary);
    }

    .member-time {
      font-size: 12px;
      color: var(--text-light);
    }

    .member-duration {
      font-size: 13px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 8px; display: block; }

    /* ========== INFO SECTION ========== */
    .info-list {
      list-style: none;
    }

    .info-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--beige);
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.6;
    }

    .info-item:last-child { border-bottom: none; }

    .info-item .bullet {
      color: var(--orange);
      font-size: 18px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    .info-link {
      color: var(--brown);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .info-link:hover { color: var(--brown-dark); }

    /* ========== FOOTER ========== */
    .footer {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 13px;
      color: var(--text-light);
    }

    /* ========== MY STATUS ========== */
    .my-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--beige), var(--cream));
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      border: 1.5px solid var(--orange-soft);
    }

    .my-status-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--brown-dark);
    }

    .my-status-timer {
      font-size: 20px;
      font-weight: 600;
      color: var(--brown-dark);
      font-variant-numeric: tabular-nums;
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--brown-dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ========== CONFIG BANNER ========== */
    .config-banner {
      background: #FFF3E0;
      border: 1.5px solid var(--orange);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--brown-dark);
      text-align: center;
      line-height: 1.6;
    }

    /* ========== AUTH ========== */
    .auth-section {
      text-align: center;
      padding: 20px;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: #fff;
      border: 1.5px solid var(--beige);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .btn-google:hover {
      border-color: var(--brown-light);
      box-shadow: var(--shadow-md);
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--cream);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 14px;
    }

    .user-bar-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-bar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .btn-logout {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--beige);
      border-radius: 20px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--red-soft);
      color: var(--red-soft);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 480px) {
      .container { padding: 16px 16px 48px; }
      .card { padding: 20px; }
      .header { padding: 32px 0 24px; }
      .header h1 { font-size: 22px; }
      .checkin-form { flex-direction: column; }
      .btn { width: 100%; }
      .my-status { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  /* ====================================================================
     CONFIG — Firebase 설정값을 여기에 붙여넣으세요
     ==================================================================== */
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAc6RFMA5FdsMCFCcErLGgbyrfNJt5SAus",
    authDomain:        "online-workplace.firebaseapp.com",
    databaseURL:       "https://online-workplace-default-rtdb.firebaseio.com",
    projectId:         "online-workplace",
    storageBucket:     "online-workplace.firebasestorage.app",
    messagingSenderId: "334115125119",
    appId:             "1:334115125119:web:e83bd82d1fa4ba44f10c4a"
  };

  const MEET_LINK = "https://meet.google.com/mxu-wiqe-xtg";
  const CALENDAR_LINK = ""; // 구글 캘린더 초대장 링크를 넣어주세요

  const IS_FIREBASE_CONFIGURED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";

  /* ====================================================================
     Firebase Init
     ==================================================================== */
  let db = null;
  let auth = null;
  let googleProvider = null;
  if (IS_FIREBASE_CONFIGURED) {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    auth = firebase.auth();
    googleProvider = new firebase.auth.GoogleAuthProvider();
  }

  /* ====================================================================
     Helpers
     ==================================================================== */
  const { useState, useEffect, useRef, useCallback } = React;

  function formatDuration(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const pad = n => String(n).padStart(2, '0');
    return h > 0
      ? `${pad(h)}:${pad(m)}:${pad(sec)}`
      : `${pad(m)}:${pad(sec)}`;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const period = h < 12 ? '오전' : '오후';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${period} ${h12}:${m}`;
  }

  function getAvatarEmoji(name) {
    const emojis = ['🧑‍💻','👩‍💻','📖','✏️','🎧','☕','🌿','📚','💡','🖊️','🎨','🔬'];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return emojis[Math.abs(hash) % emojis.length];
  }

/* ====================================================================
     Toast Component
     ==================================================================== */
  function Toast({ message }) {
    const [show, setShow] = useState(false);
    useEffect(() => {
      if (message) {
        setShow(true);
        const t = setTimeout(() => setShow(false), 2500);
        return () => clearTimeout(t);
      }
    }, [message]);
    return <div className={`toast ${show ? 'show' : ''}`}>{message}</div>;
  }

  /* ====================================================================
     Main App
     ==================================================================== */
  function App() {
    const [user, setUser] = useState(null);        // Firebase Auth user
    const [authLoading, setAuthLoading] = useState(true);
    const [isCheckedIn, setIsCheckedIn] = useState(false);
    const [myKey, setMyKey] = useState(null);
    const [exitLogRef, setExitLogRef] = useState(null);
    const [enteredAt, setEnteredAt] = useState(null);
    const [members, setMembers] = useState([]);
    const [elapsed, setElapsed] = useState(0);
    const [toast, setToast] = useState('');
    const [logs, setLogs] = useState([]);
    const toastKey = useRef(0);
    const timerRef = useRef(null);

    // Google Auth 상태 리스너
    useEffect(() => {
      if (!auth) { setAuthLoading(false); return; }
      const unsubscribe = auth.onAuthStateChanged((u) => {
        setUser(u);
        setAuthLoading(false);
      });
      return () => unsubscribe();
    }, []);

    const displayName = user ? user.displayName : '';
    const photoURL = user ? user.photoURL : '';

    // Google 로그인
    const handleGoogleLogin = useCallback(() => {
      if (!auth) return;
      auth.signInWithPopup(googleProvider).catch(err => {
        console.error(err);
        showToast('로그인에 실패했습니다');
      });
    }, []);

    // 로그아웃
    const handleLogout = useCallback(() => {
      if (isCheckedIn) handleCheckOut();
      if (auth) auth.signOut();
    }, [isCheckedIn]);

    // 실시간 멤버 리스너
    useEffect(() => {
      if (!db) return;
      const ref = db.ref('workspace/currentMembers');
      const handler = ref.on('value', snap => {
        const data = snap.val() || {};
        const list = Object.entries(data).map(([key, val]) => ({
          key, ...val
        }));
        list.sort((a, b) => a.enteredAt - b.enteredAt);
        setMembers(list);
      });
      return () => ref.off('value', handler);
    }, []);

    // 오늘의 활동 로그 리스너
    useEffect(() => {
      if (!db) return;
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const ref = db.ref('workspace/log').orderByChild('timestamp').startAt(todayStart).limitToLast(50);
      const handler = ref.on('value', snap => {
        const data = snap.val() || {};
        const list = Object.entries(data).map(([key, val]) => ({
          key, ...val
        }));
        list.sort((a, b) => b.timestamp - a.timestamp);
        setLogs(list);
      });
      return () => ref.off('value', handler);
    }, []);

    // 타이머
    useEffect(() => {
      if (isCheckedIn && enteredAt) {
        timerRef.current = setInterval(() => {
          setElapsed(Date.now() - enteredAt);
        }, 1000);
        return () => clearInterval(timerRef.current);
      } else {
        clearInterval(timerRef.current);
        setElapsed(0);
      }
    }, [isCheckedIn, enteredAt]);

    // 브라우저 닫기/새로고침 시 퇴실
    useEffect(() => {
      const handleUnload = () => {
        if (myKey && db) {
          // 동기적 퇴실은 불가하므로 onDisconnect에 의존
        }
      };
      window.addEventListener('beforeunload', handleUnload);
      return () => window.removeEventListener('beforeunload', handleUnload);
    }, [myKey]);

    const showToast = useCallback((msg) => {
      toastKey.current += 1;
      setToast('');
      setTimeout(() => setToast(msg), 50);
    }, []);

    // 입실
    const handleCheckIn = useCallback(() => {
      const name = displayName;
      if (!name) return;
      if (!db) {
        showToast('Firebase가 설정되지 않았습니다');
        return;
      }

      const ref = db.ref('workspace/currentMembers');
      const newRef = ref.push();
      const now = Date.now();
      const photo = photoURL || '';
      const data = { nickname: name, photoURL: photo, enteredAt: now };

      // onDisconnect 설정 (브라우저 종료 시 자동 퇴실)
      newRef.onDisconnect().remove();

      // onDisconnect 시 퇴실 로그도 자동 기록
      const autoExitRef = db.ref('workspace/log').push();
      autoExitRef.onDisconnect().set({
        nickname: name,
        photoURL: photo,
        action: 'exit',
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      newRef.set(data).then(() => {
        setExitLogRef(autoExitRef);
        setMyKey(newRef.key);
        setEnteredAt(now);
        setIsCheckedIn(true);

        showToast(`${name}님, 환영합니다 ☕`);

        // Meet 자동 연결
        window.open(MEET_LINK, '_blank');

        // 로그 기록
        db.ref('workspace/log').push({
          nickname: name,
          photoURL: photo,
          action: 'enter',
          timestamp: now
        });
      });
    }, [displayName, showToast]);

    // 퇴실
    const handleCheckOut = useCallback(() => {
      if (!db || !myKey) return;

      // 자동 퇴실 예약 취소 (직접 퇴실하므로 중복 방지)
      if (exitLogRef) {
        exitLogRef.onDisconnect().cancel();
        setExitLogRef(null);
      }

      db.ref(`workspace/currentMembers/${myKey}`).remove().then(() => {
        showToast('퇴실 완료! 수고하셨습니다 ✨');

        db.ref('workspace/log').push({
          nickname: displayName,
          photoURL: photoURL || '',
          action: 'exit',
          timestamp: Date.now()
        });

        setIsCheckedIn(false);
        setMyKey(null);
        setEnteredAt(null);
      });
    }, [myKey, displayName, showToast]);

    return (
      <div className="container">

        {/* 헤더 */}
        <header className="header">
          <span className="header-icon">☕</span>
          <h1>24hr online workplace</h1>
          <p className="subtitle">조용히 함께 작업하는 온라인 공간</p>
        </header>

        {/* Firebase 미설정 안내 */}
        {!IS_FIREBASE_CONFIGURED && (
          <div className="config-banner">
            ⚙️ Firebase가 아직 설정되지 않았습니다.<br />
            <code>index.html</code> 상단의 <strong>FIREBASE_CONFIG</strong>에 설정값을 입력해 주세요.<br />
            (자세한 방법은 <strong>firebase-setup-guide.md</strong>를 참고하세요)
          </div>
        )}

        {/* 실시간 현황 카드 */}
        <section className="card">
          <div className="card-title">
            <span className="icon">📡</span>
            실시간 현황
          </div>

          <div className="status-bar">
            <span className={`status-dot ${members.length > 0 ? 'active' : ''}`}></span>
            <span>현재 <span className="member-count">{members.length}</span>명 접속 중</span>
          </div>

          {/* 로그인 안 된 상태 */}
          {authLoading ? (
            <div className="auth-section">
              <span style={{ color: 'var(--text-light)', fontSize: 14 }}>로딩 중...</span>
            </div>
          ) : !user ? (
            <div className="auth-section">
              <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 16 }}>
                Google 계정으로 로그인하고 입실해보세요
              </p>
              <button className="btn-google" onClick={handleGoogleLogin}>
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
                Google로 로그인
              </button>
            </div>
          ) : (
            <div>
              {/* 로그인된 사용자 정보 */}
              <div className="user-bar">
                <div className="user-bar-info">
                  {photoURL && <img className="user-bar-avatar" src={photoURL} alt="" referrerPolicy="no-referrer" />}
                  <span style={{ fontWeight: 500 }}>{displayName}</span>
                </div>
                <button className="btn-logout" onClick={handleLogout}>로그아웃</button>
              </div>

              {/* 입실 중인 내 상태 */}
              {isCheckedIn && (
                <div className="my-status">
                  <div className="my-status-info">
                    {photoURL && <img className="user-bar-avatar" src={photoURL} alt="" referrerPolicy="no-referrer" />}
                    <span>{displayName} — 작업 중</span>
                  </div>
                  <div className="my-status-timer">{formatDuration(elapsed)}</div>
                </div>
              )}

              {/* 입실/퇴실 버튼 */}
              {!isCheckedIn ? (
                <button
                  className="btn btn-enter"
                  onClick={handleCheckIn}
                  style={{
                    width: '100%',
                    padding: '16px',
                    fontSize: '16px',
                    background: 'linear-gradient(135deg, var(--brown), var(--brown-dark))',
                  }}
                >
                  ☕ 입실하기
                </button>
              ) : (
                <div className="checkin-form">
                  <button className="btn btn-exit" onClick={handleCheckOut} style={{ flex: 1 }}>
                    퇴실하기
                  </button>
                </div>
              )}
            </div>
          )}

          {/* 접속자 목록 */}
          {members.length > 0 ? (
            <ul className="member-list">
              {members.map(m => (
                <li key={m.key} className="member-item">
                  <div className="member-info">
                    {m.photoURL ? (
                      <img className="user-bar-avatar" src={m.photoURL} alt="" referrerPolicy="no-referrer" style={{ width: 32, height: 32 }} />
                    ) : (
                      <div className="member-avatar">{getAvatarEmoji(m.nickname)}</div>
                    )}
                    <div>
                      <div className="member-nickname">
                        {m.nickname} {m.key === myKey && <span style={{ fontSize: 11, color: 'var(--orange)' }}>(나)</span>}
                      </div>
                      <div className="member-time">{formatTime(m.enteredAt)} 입실</div>
                    </div>
                  </div>
                  <MemberDuration enteredAt={m.enteredAt} />
                </li>
              ))}
            </ul>
          ) : (
            <div className="empty-state">
              <span className="icon">🌙</span>
              아직 아무도 없어요. 첫 번째 입실자가 되어보세요!
            </div>
          )}

          {/* Meet 다시 열기 (입실 중일 때만) */}
          {isCheckedIn && (
            <a className="btn-meet" href={MEET_LINK} target="_blank" rel="noopener noreferrer" style={{ fontSize: 14, padding: '12px', background: 'var(--brown-light)', opacity: 0.85 }}>
              🎥 Google Meet 다시 열기
            </a>
          )}
        </section>

        {/* 오늘의 활동 로그 */}
        {logs.length > 0 && (
          <section className="card">
            <div className="card-title">
              <span className="icon">📝</span>
              오늘의 입퇴실 기록
            </div>
            <ul className="member-list" style={{ maxHeight: '420px', overflowY: 'auto' }}>
              {logs.map(log => (
                <li key={log.key} className="member-item" style={{ padding: '10px 16px' }}>
                  <div className="member-info">
                    {log.photoURL ? (
                      <img className="user-bar-avatar" src={log.photoURL} alt="" referrerPolicy="no-referrer" style={{ width: 28, height: 28 }} />
                    ) : (
                      <div className="member-avatar" style={{
                        width: 28, height: 28, fontSize: 12,
                        background: log.action === 'enter' ? 'var(--green-soft)' : 'var(--orange-soft)'
                      }}>
                        {log.action === 'enter' ? '🟢' : '👋'}
                      </div>
                    )}
                    <div>
                      <span className="member-nickname" style={{ fontSize: 14 }}>
                        {log.nickname}
                      </span>
                      <span style={{ fontSize: 13, color: 'var(--text-light)', marginLeft: 6 }}>
                        {log.action === 'enter' ? '입실' : '퇴실'}
                      </span>
                    </div>
                  </div>
                  <span className="member-time" style={{ fontSize: 12 }}>{formatTime(log.timestamp)}</span>
                </li>
              ))}
            </ul>
          </section>
        )}

        {/* 안내 */}
        <section className="card">
          <div className="card-title">
            <span className="icon">📋</span>
            안내
          </div>
          <ul className="info-list">
            <li className="info-item">
              <span className="bullet">•</span>
              <span>마이크 <strong>음소거</strong> 기본, 카메라는 자유 (책상/키보드 정도)</span>
            </li>
            <li className="info-item">
              <span className="bullet">•</span>
              <span>Meet 설정 → <strong>'아무도 없는 통화에서 나가기'</strong> 꺼주세요</span>
            </li>
            <li className="info-item">
              <span className="bullet">•</span>
              <span>본명 노출이 부담되면 <strong>구글 계정에서 이름 변경</strong> 후 참여</span>
            </li>
            <li className="info-item">
              <span className="bullet">•</span>
              <span>
                {CALENDAR_LINK ? (
                  <><a className="info-link" href={CALENDAR_LINK} target="_blank" rel="noopener noreferrer">캘린더 초대장</a>에서 <strong>'참석'</strong> 또는 <strong>'미정'</strong> 선택 (구글 계정 필수) — '불참' 시 호스트 없이 입실 불가</>
                ) : (
                  <>캘린더 초대장에서 <strong>'참석'</strong> 또는 <strong>'미정'</strong> 선택 (구글 계정 필수) — '불참' 시 호스트 없이 입실 불가</>
                )}
              </span>
            </li>
            <li className="info-item">
              <span className="bullet">•</span>
              <span>시간대에 따라 인원은 유동적 — 조용히 작업만 하셔도, 잠깐 들러도 좋습니다</span>
            </li>
          </ul>
        </section>

        {/* 푸터 */}
        <footer className="footer">
          24hr online workplace
        </footer>

        <Toast message={toast} />
      </div>
    );
  }

  /* 멤버별 경과 시간 (개별 타이머) */
  function MemberDuration({ enteredAt }) {
    const [dur, setDur] = useState(Date.now() - enteredAt);
    useEffect(() => {
      const id = setInterval(() => setDur(Date.now() - enteredAt), 1000);
      return () => clearInterval(id);
    }, [enteredAt]);
    return <span className="member-duration">{formatDuration(dur)}</span>;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
